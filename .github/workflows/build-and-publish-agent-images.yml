name: Build and Publish Agent Images
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/build-and-publish-agent-images.yml
      - containers/ubuntu/Dockerfile
      - containers/codex/Dockerfile
      - containers/codex/config.toml
      - containers/claude-code/Dockerfile
      - containers/claude-code/settings.json
permissions:
  contents: read
  packages: write
env:
  UBUNTU_IMAGE_NAME: ghcr.io/betarixm/catchy-ubuntu
  IMAGE_NAME: ghcr.io/betarixm/catchy-codex
  CLAUDE_CODE_IMAGE_NAME: ghcr.io/betarixm/catchy-claude-code
jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      ubuntu: ${{ steps.filter.outputs.ubuntu }}
      codex: ${{ steps.filter.outputs.codex }}
      claude_code: ${{ steps.filter.outputs.claude_code }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: filter
        env:
          BEFORE: ${{ github.event.before }}
          AFTER: ${{ github.sha }}
          EVENT_NAME: ${{ github.event_name }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            ubuntu=true
            codex=true
            claude_code=true
          else
            if [[ "$BEFORE" =~ ^0+$ ]]; then
              BEFORE="$(git rev-list --max-parents=0 HEAD)"
            fi

            changed_files="$(git diff --name-only "$BEFORE" "$AFTER")"
            printf '%s\n' "$changed_files"

            ubuntu=false
            codex=false
            claude_code=false

            if grep -Fxq "containers/ubuntu/Dockerfile" <<<"$changed_files"; then
              ubuntu=true
              codex=true
              claude_code=true
            fi
            if grep -Fxq "containers/codex/Dockerfile" <<<"$changed_files"; then
              codex=true
            fi
            if grep -Fxq "containers/codex/config.toml" <<<"$changed_files"; then
              codex=true
            fi
            if grep -Fxq "containers/claude-code/Dockerfile" <<<"$changed_files"; then
              claude_code=true
            fi
            if grep -Fxq "containers/claude-code/settings.json" <<<"$changed_files"; then
              claude_code=true
            fi
          fi

          {
            echo "ubuntu=$ubuntu"
            echo "codex=$codex"
            echo "claude_code=$claude_code"
          } >> "$GITHUB_OUTPUT"

  publish-ubuntu:
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.ubuntu == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: containers/ubuntu
          file: containers/ubuntu/Dockerfile
          push: true
          cache-from: type=gha,scope=catchy-ubuntu
          cache-to: type=gha,mode=max,scope=catchy-ubuntu
          tags: |
            ${{ env.UBUNTU_IMAGE_NAME }}:26.04
            ${{ env.UBUNTU_IMAGE_NAME }}:${{ github.sha }}

  publish-codex:
    runs-on: ubuntu-latest
    needs:
      - changes
      - publish-ubuntu
    if: ${{ always() && needs.changes.outputs.codex == 'true' && (needs.publish-ubuntu.result == 'success' || needs.publish-ubuntu.result == 'skipped') }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: containers/codex
          file: containers/codex/Dockerfile
          push: true
          cache-from: type=gha,scope=catchy-codex
          cache-to: type=gha,mode=max,scope=catchy-codex
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

  publish-claude-code:
    runs-on: ubuntu-latest
    needs:
      - changes
      - publish-ubuntu
    if: ${{ always() && needs.changes.outputs.claude_code == 'true' && (needs.publish-ubuntu.result == 'success' || needs.publish-ubuntu.result == 'skipped') }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: containers/claude-code
          file: containers/claude-code/Dockerfile
          push: true
          cache-from: type=gha,scope=catchy-claude-code
          cache-to: type=gha,mode=max,scope=catchy-claude-code
          tags: |
            ${{ env.CLAUDE_CODE_IMAGE_NAME }}:latest
            ${{ env.CLAUDE_CODE_IMAGE_NAME }}:${{ github.sha }}
